openapi: 3.0.3
info:
  title: Industry Research
  description: Starts generating an Industry Research report for your specified industry.
  version: 2.0.0
  license:
    name: Proprietary
servers:
- url: https://api.wokelo.ai
paths:
  /api/workflow_manager/start/:
    post:
      tags:
      - Workflow Automation
      summary: Industry Research
      description: Starts generating an Industry Research report for your specified
        industry.
      operationId: post_workflow_manager_industry_research
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: integer
                    description: "[FROM EXAMPLE \u2014 not in formal docs schema]\
                      \ Report identifier returned when the workflow request succeeds."
                description: '[FROM OFFICIAL DOCS] Response schema from company-research.md.'
                example: &id001
                  report_id: 123345
              example: *id001
        '400':
          description: Company primer
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
              example:
                message: Invalid payload. search query is required.
      x-source-variants:
      - group_path: Workflow Automation
        request_name: Company Research
      - group_path: Workflow Automation
        request_name: Industry Research
      - group_path: Workflow Automation
        request_name: Peer comparison
      - group_path: Workflow Automation
        request_name: Custom Workflows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndustryResearchRequest'
            example:
              workflow: industry_primer
              industry: gaming
              workbook_name: Industry Research - Gaming
      security:
      - bearerAuth: []
tags:
- name: Workflow Automation
  description: Workflow-driven report generation endpoints.
components:
  schemas:
    IndustryResearchRequest:
      type: object
      properties:
        industry:
          type: string
          description: Industry on which the report will be created
        workflow:
          type: string
          description: '`industry_primer`'
          enum:
          - industry_primer
        workbook_name:
          type: string
          description: Name with which the workbook will be saved
        custom_files:
          type: array
          items:
            type: object
            properties: {}
          description: Files to include in the report. Use fileName values from the
            file upload response
      description: '[FROM OFFICIAL DOCS] Industry Research variant with workflow=`industry_primer`.'
      required:
      - industry
      - workflow
      example:
        workflow: industry_primer
        industry: gaming
        workbook_name: Industry Research - Gaming
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
