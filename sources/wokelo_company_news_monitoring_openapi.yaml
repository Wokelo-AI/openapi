openapi: 3.1.0
info:
  title: Wokelo Company News Monitoring API
  version: 1.0.0
  description: |
    Fetch the latest news articles for a given company, enriched with AI-generated
    summaries, event categories, publisher metadata, and article text.

    Results are returned synchronously in the response.

servers:
  - url: https://api.wokelo.ai

security:
  - bearerAuth: []

tags:
  - name: Company News Monitoring
    description: News retrieval and filtering for a specific company.

paths:
  /api/enterprise/company/news/:
    get:
      tags:
        - Company News Monitoring
      operationId: getCompanyNews
      summary: Fetch company news articles
      description: |
        Returns recent news articles for a specified company, enriched with AI-generated
        summaries, event categories, metadata, and scraped article text.

        Supports filtering by date range, category, publisher allowlist, publisher
        blacklist, pagination, and result limit.

        Note: the documentation examples encode some multi-value filters directly
        into query strings. This spec models those filters conservatively as strings
        rather than assuming a repeated-parameter or array-based wire format.
      parameters:
        - name: company
          in: query
          required: true
          description: Company permalink or identifier to monitor.
          schema:
            type: string
          example: tesla
        - name: blacklisted
          in: query
          required: false
          description: |
            Blacklisted publisher URL or encoded value. Documentation shows URL-encoded
            string input rather than a formally typed array.
          schema:
            type: string
          example: https://www.prnewswire.com/
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return.
          schema:
            type: integer
            default: 100
            minimum: 1
          example: 100
        - name: start_date
          in: query
          required: false
          description: Start date filter in YYYY-MM-DD format.
          schema:
            type: string
            format: date
          example: 2025-01-01
        - name: end_date
          in: query
          required: false
          description: End date filter in YYYY-MM-DD format.
          schema:
            type: string
            format: date
          example: 2026-03-15
        - name: category
          in: query
          required: false
          description: |
            News category filter. Documentation examples show comma-separated values
            in a single query string.
          schema:
            type: string
          example: PARTNERSHIPS
        - name: offset
          in: query
          required: false
          description: Pagination offset.
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: publishers
          in: query
          required: false
          description: |
            Publisher URL filter. Documentation shows URL string values in the query.
          schema:
            type: string
          example: https://www.bloomberg.com/
      responses:
        '200':
          description: Company news fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyNewsResponse'
              example:
                status: success
                data:
                  - ai_summary: Tesla Inc.'s energy division was granted a license to supply electricity in the UK.
                    type: Partnerships & Alliances
                    url: https://www.bloomberg.com/news/articles/2026-03-12/tesla-s-energy-division-gets-uk-license-to-supply-electricity
                    title: Tesla’s Energy Division Gets UK License to Supply Electricity
                    scraped_text: Tesla Inc.’s energy division has been granted a license to supply electricity in the UK.
                    company_name: Tesla
                    publisher: bloomberg
                    published_date: '2026-03-12 07:55:50'
                    source: Wokelo
                    author: Priscila Azevedo Rocha
                    countries:
                      - GBR
                    sentiment: Neutral
                    company_names:
                      - name: Tesla
                        website: http://tesla-pa.com/
                    primary_tag: Partnerships & Alliances
                    original_language: EN
                    secondary_tags: []
                    newsworthiness_impact: Medium
                    primary_industry: C&I Renewable Supply & Green Tariffs
                    secondary_industry: []
                count: 1
                total: 1
                limit: 100
                offset: 0
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: bad_request
                  message: Invalid query parameters.
                  details:
                    - field: company
                      message: Company is required.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: unauthorized
                  message: Missing or invalid bearer token.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please retry later.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: internal_server_error
                  message: An unexpected error occurred.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token sent in the Authorization header.

  schemas:
    CompanyNewsResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - data
        - count
        - total
        - limit
        - offset
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompanyNewsArticle'
        count:
          type: integer
          example: 4
        total:
          type: integer
          example: 4
        limit:
          type: integer
          example: 100
        offset:
          type: integer
          example: 0

    CompanyNewsArticle:
      type: object
      additionalProperties: true
      properties:
        ai_summary:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
          format: uri
        title:
          type: string
          nullable: true
        scraped_text:
          type: string
          nullable: true
        company_name:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        published_date:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        author:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          nullable: true
        countries:
          type: array
          items:
            type: string
        sentiment:
          type: string
          nullable: true
        company_names:
          type: array
          items:
            $ref: '#/components/schemas/ReferencedCompany'
        primary_tag:
          type: string
          nullable: true
        original_language:
          type: string
          nullable: true
        secondary_tags:
          type: array
          items:
            type: string
        newsworthiness_impact:
          type: string
          nullable: true
        primary_industry:
          type: string
          nullable: true
        secondary_industry:
          type: array
          items:
            type: string

    ReferencedCompany:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
          format: uri

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: bad_request
            message:
              type: string
              example: Invalid query parameters.
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      additionalProperties: true
      properties:
        field:
          type: string
          example: company
        message:
          type: string
          example: Company is required.
