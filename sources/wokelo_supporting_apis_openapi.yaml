openapi: 3.1.0
info:
  title: Wokelo Supporting APIs
  version: 1.0.0
  description: |
    Supporting APIs for search, file upload, request lifecycle management,
    and report lifecycle management.

    This specification covers:
    - Company Search
    - File Upload
    - Request Status / Cancel / Result
    - Report Status / Download / Config

servers:
  - url: https://api.wokelo.ai

security:
  - bearerAuth: []

tags:
  - name: Company Search
  - name: File Upload
  - name: Request Lifecycle
  - name: Report Lifecycle

paths:
  /api/enterprise/company/search:
    get:
      tags:
        - Company Search
      operationId: searchCompanies
      summary: Search companies in the Wokelo database
      description: |
        Search the Wokelo database by company name, website, or ticker symbol
        to retrieve permalinks and key attributes used by other API calls.

        If a company cannot be found in the Wokelo database, other APIs
        (except Monitoring API) can still use the full company website URL
        instead of the permalink.
      parameters:
        - name: query
          in: query
          required: true
          description: Search term such as a company name, website, or ticker.
          schema:
            type: string
          example: wokelo
        - name: search_by
          in: query
          required: true
          description: Field used to perform the search.
          schema:
            type: string
            enum:
              - name
              - website
              - ticker
          example: name
        - name: company_type
          in: query
          required: false
          description: Company type filter.
          schema:
            type: string
            enum:
              - all
              - private
              - public
              - startup
          example: all
      responses:
        '200':
          description: Company search completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySearchResponse'
              example:
                status: success
                data:
                  - name: Wokelo AI
                    permalink: wokelo-ai
                    short_description: Wokelo builds purpose-built AI agents...
                    founded_year: "2023"
                    ipo_status: private
                    hq: Seattle, United States
                    website: https://www.wokelo.ai/
                    ticker: ""
                    country_code: US
                    last_funding_round: Seed
                count: 1
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: bad_request
                  message: Invalid query parameters.
                  details:
                    - field: query
                      message: Query is required.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: unauthorized
                  message: Missing or invalid bearer token.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please retry later.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/assets/upload/:
    post:
      tags:
        - File Upload
      operationId: uploadAssets
      summary: Upload files for research workflows
      description: |
        Upload proprietary files to Wokelo to supplement research reports
        with internal data.

        Each uploaded file receives a unique identifier that can be referenced
        in custom workflow inputs. The documentation examples send multipart
        form data with repeated `files` parts plus a `fileUUID` JSON-string field.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileUploadRequest'
            encoding:
              files:
                style: form
                explode: true
              fileUUID:
                style: form
            example:
              fileUUID: "[\"k3m8n5p1q6\", \"a7f4b9e2c3\"]"
      responses:
        '200':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: success
                data:
                  - fileName: k3m8n5p1q6
                    originalName: lemonade_diligence.pdf
                  - fileName: a7f4b9e2c3
                    originalName: lemonade.pdf
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/enterprise/request/status/:
    get:
      tags:
        - Request Lifecycle
      operationId: getRequestStatus
      summary: Check asynchronous request status
      description: |
        Check the status of an asynchronous Enrichment, Insights, or Company Grid request.
      parameters:
        - name: request_id
          in: query
          required: true
          description: Unique request identifier.
          schema:
            type: string
          example: b1f10ebf-a251-4e2d-b867-8482ac701987
      responses:
        '200':
          description: Request status returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestStatusResponse'
              example:
                request_id: b1f10ebf-a251-4e2d-b867-8482ac701987
                status: COMPLETED
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/enterprise/request/cancel:
    post:
      tags:
        - Request Lifecycle
      operationId: cancelRequest
      summary: Cancel an asynchronous request
      description: |
        Cancel a request that is already placed and currently in `PENDING`
        or `PROCESSING` state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequestBody'
            example:
              request_id: 5b8eff600-366f-465c-b795-68837043a2d3
      responses:
        '200':
          description: Request cancelled successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: success
                request_id: 5b8eff600-366f-465c-b795-68837043a2d3
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/enterprise/request/result/:
    get:
      tags:
        - Request Lifecycle
      operationId: getRequestResult
      summary: Retrieve completed asynchronous request result
      description: |
        Retrieve the result of an asynchronous request after its status is `COMPLETED`.
      parameters:
        - name: request_id
          in: query
          required: true
          description: Unique request identifier.
          schema:
            type: string
          example: d7a78d10-663a-493f-9b79-be1e6094f3bb
      responses:
        '200':
          description: Request result returned successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                request_id: d7a78d10-663a-493f-9b79-be1e6094f3bb
                status: COMPLETED
                result:
                  data: {}
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/assets/get_notebook_status/:
    get:
      tags:
        - Report Lifecycle
      operationId: getReportStatus
      summary: Check report status
      description: |
        Get the status of a report created using workflow APIs such as
        Company Research, Industry Research, Peer Comparison, or Custom workflows.
      parameters:
        - name: report_id
          in: query
          required: true
          description: Report identifier.
          schema:
            oneOf:
              - type: integer
              - type: string
          example: 109196
      responses:
        '200':
          description: Report status returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportStatusResponse'
              example:
                report_id: 109196
                status: COMPLETED
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/assets/download_report/:
    post:
      tags:
        - Report Lifecycle
      operationId: downloadReport
      summary: Download a completed report
      description: |
        Download a completed report in one of the supported export formats:
        `pdf`, `docx`, `ppt`, or `json`.

        The documentation notes that `ppt` is only supported for company research
        and industry research reports.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadReportRequest'
            example:
              report_id: 109196
              file_type: json
      responses:
        '200':
          description: Report download payload returned successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                report_id: 109196
                file_type: json
                url: https://api.wokelo.ai/downloads/report-109196.json
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wkl/notebook/configuration/:
    post:
      tags:
        - Report Lifecycle
      operationId: getReportConfiguration
      summary: Retrieve report configuration
      description: |
        Retrieve the settings originally used to trigger a report.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportConfigurationRequest'
            example:
              notebook_id: 103737
      responses:
        '200':
          description: Report configuration returned successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                notebook_id: 103737
                configuration:
                  workflow: company_primer
                  permalink: salesforce
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token sent in the Authorization header.

  schemas:
    CompanySearchResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - data
        - count
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompanySearchResult'
        count:
          type: integer
          example: 1

    CompanySearchResult:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: true
        permalink:
          type: string
          nullable: true
        short_description:
          type: string
          nullable: true
        founded_year:
          type: string
          nullable: true
        ipo_status:
          type: string
          nullable: true
        hq:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
          format: uri
        ticker:
          type: string
          nullable: true
        country_code:
          type: string
          nullable: true
        last_funding_round:
          type: string
          nullable: true

    FileUploadRequest:
      type: object
      additionalProperties: false
      required:
        - files
      properties:
        files:
          type: array
          description: One or more files uploaded as multipart form-data parts.
          items:
            type: string
            format: binary
        fileUUID:
          type: string
          description: JSON-encoded array of UUID-like identifiers associated with the uploaded files.
          example: "[\"k3m8n5p1q6\", \"a7f4b9e2c3\"]"

    RequestStatusResponse:
      type: object
      additionalProperties: true
      properties:
        request_id:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AsyncStatus'

    ReportStatusResponse:
      type: object
      additionalProperties: true
      properties:
        report_id:
          oneOf:
            - type: integer
            - type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AsyncStatus'

    AsyncStatus:
      type: string
      enum:
        - PENDING
        - PROCESSING
        - COMPLETED
        - FAILED
        - CANCELLED
      description: |
        Possible asynchronous job statuses:
        - PENDING: request received and queued
        - PROCESSING: request is being processed
        - COMPLETED: request finished successfully
        - FAILED: request failed
        - CANCELLED: request was cancelled by the user

    CancelRequestBody:
      type: object
      additionalProperties: false
      required:
        - request_id
      properties:
        request_id:
          type: string
          example: 5b8eff600-366f-465c-b795-68837043a2d3

    DownloadReportRequest:
      type: object
      additionalProperties: false
      required:
        - report_id
        - file_type
      properties:
        report_id:
          oneOf:
            - type: integer
            - type: string
          example: 109196
        file_type:
          type: string
          enum:
            - pdf
            - docx
            - ppt
            - json
          example: json

    ReportConfigurationRequest:
      type: object
      additionalProperties: false
      required:
        - notebook_id
      properties:
        notebook_id:
          oneOf:
            - type: integer
            - type: string
          example: 103737

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: bad_request
            message:
              type: string
              example: Invalid request payload.
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      additionalProperties: true
      properties:
        field:
          type: string
          example: query
        message:
          type: string
          example: Query is required.
