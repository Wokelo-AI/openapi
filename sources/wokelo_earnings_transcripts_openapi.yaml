openapi: 3.0.3
info:
  title: Fetch Earnings Transcripts
  description: Fetch earnings call transcripts for a public company. Supports year-range filtering.
  version: 2.0.0
  license:
    name: Proprietary
servers:
- url: https://api.wokelo.ai
paths:
  /api/enterprise/company/earnings-calls/:
    get:
      tags:
      - Enrichment
      summary: Company Earnings Transcripts
      description: Fetch earnings call transcripts for a public company. Supports year-range filtering.
      operationId: get_api_enterprise_company_earnings-calls
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        transcript_title:
                          type: string
                        transcript_name:
                          type: string
                        ticker:
                          type: string
                        transcript_url:
                          type: string
                        date:
                          type: string
                        year:
                          type: integer
                        quarter:
                          type: integer
                        transcript_data:
                          type: object
                          properties:
                            date:
                              type: string
                            participant:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  role:
                                    type: string
                                  pro_id:
                                    type: integer
                                  job_title:
                                    type: string
                                  description:
                                    type: string
                                  company_name:
                                    type: string
                                  transcript_person_id:
                                    type: integer
                                required:
                                - name
                                - role
                                - pro_id
                                - job_title
                                - description
                                - company_name
                                - transcript_person_id
                            transcript:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  speech:
                                    type: string
                                  session:
                                    type: string
                                  person_id:
                                    type: integer
                                  person_company: {}
                                  component_order:
                                    type: integer
                                required:
                                - name
                                - speech
                                - session
                                - person_id
                                - person_company
                                - component_order
                            title:
                              type: string
                            quarter:
                              type: integer
                            year:
                              type: integer
                          required:
                          - date
                          - participant
                          - transcript
                          - title
                          - quarter
                          - year
                      required:
                      - transcript_title
                      - transcript_name
                      - ticker
                      - transcript_url
                      - date
                      - year
                      - quarter
                      - transcript_data
                  count:
                    type: integer
                  from_year:
                    type: integer
                  to_year:
                    type: integer
                required:
                - status
                - data
                - count
                - from_year
                - to_year
                description: '[FROM OFFICIAL DOCS] Response schema derived from example in earnings-transcripts.md.'
              example:
                status: success
                data:
