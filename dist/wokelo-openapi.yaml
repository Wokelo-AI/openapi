          lang: Python
          source: |-
            import requests

            headers = {
                "Authorization": "Bearer YOUR_TOKEN",
                "Content-Type": "application/json"
            }
            response = requests.get(
                "https://api.wokelo.ai/api/enterprise/company/employee-reviews/",
                headers=headers,
                params={"company": "salesforce", "limit": 50, "offset": 0}
            )
            print(response.json())
