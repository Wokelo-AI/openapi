        status:
          $ref: '#/components/schemas/AsyncStatus'
    AsyncStatus:
      type: string
      enum:
        - PENDING
        - PROCESSING
        - COMPLETED
        - FAILED
        - CANCELLED
      description: |
        Possible asynchronous job statuses:
        - PENDING: request received and queued
        - PROCESSING: request is being processed
        - COMPLETED: request finished successfully
        - FAILED: request failed
        - CANCELLED: request was cancelled by the user
    CancelRequestBody:
      type: object
      additionalProperties: false
      required:
        - request_id
      properties:
        request_id:
          type: string
          example: 5b8eff600-366f-465c-b795-68837043a2d3
    DownloadReportRequest:
      type: object
      additionalProperties: false
      required:
        - report_id
        - file_type
      properties:
        report_id:
          oneOf:
            - type: integer
            - type: string
          example: 109196
        file_type:
          type: string
          enum:
            - pdf
            - docx
            - ppt
            - json
          example: json
    ReportConfigurationRequest:
      type: object
      additionalProperties: false
      required:
        - notebook_id
      properties:
        notebook_id:
          oneOf:
            - type: integer
            - type: string
          example: 103737
    TargetScreeningRequest:
      type: object
      additionalProperties: false
      required:
        - company
      properties:
        topic:
          type: string
          description: |
            Industry or product domain. Defaults to the product category of the
            acquiring company when omitted.
          example: cybersecurity software
        company:
          type: string
          description: Permalink or URL of the acquiring company.
          example: microsoft
        parameters:
          $ref: '#/components/schemas/TargetScreeningParameters'
    TargetScreeningParameters:
      type: object
      additionalProperties: false
      properties:
        detailed_query:
          type: string
          description: A descriptive query to refine the target search scope.
          example: Looking for B2B SaaS companies in the cybersecurity space
        keywords:
          type: array
          description: Keywords used to identify and filter relevant target companies.
          items:
            type: string
          example:
            - zero trust
            - endpoint security
        sample_companies:
          type: array
          description: Representative company permalinks used to anchor the target search.
          items:
            type: string
          example:
            - crowdstrike
            - sentinel
        geography:
          type: array
          description: Geographic scope. Documentation examples show ISO codes like USA, though one example also uses country
            names.
          items:
            type: string
          example:
            - USA
        company_type:
          type: string
          description: Type of company to include.
          enum:
            - private
            - public
            - all
          example: private
        employee_count:
          type: array
          description: Headcount range filters. Empty array means all.
          items:
            type: string
          example:
            - 11-50
            - 51-100
        founded_year:
          $ref: '#/components/schemas/RangeFilterInteger'
        funding_stage:
          type: array
          description: Funding stage filters. Empty array means all.
          items:
            type: string
          example:
            - Series A
            - Series B
        total_funding:
          $ref: '#/components/schemas/TargetRangeFilterNumberString'
        revenue:
          $ref: '#/components/schemas/TargetRangeFilterNumberString'
    RangeFilterInteger:
      type: object
      additionalProperties: false
      properties:
        from:
          type: integer
          nullable: true
        to:
          type: integer
          nullable: true
    TargetScreeningResponse:
      type: object
      additionalProperties: false
      required:
        - request_id
        - status
        - result
      properties:
        request_id:
          type: string
          description: Unique request identifier.
          example: f525ae70-b6aa-4b6e-b0af-c40efaf9681c
        status:
          type: string
          description: Processing status.
          example: COMPLETED
        result:
          type: array
          description: Ranked list of scored target companies.
          items:
            $ref: '#/components/schemas/TargetCompany'
