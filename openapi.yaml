  /api/enterprise/company/news/:
    get:
      tags:
        - Company News Monitoring
      operationId: getCompanyNews
      summary: Fetch company news articles
      description: |
        Returns recent news articles for a specified company, enriched with AI-generated
        summaries, event categories, metadata, and scraped article text.

        Supports filtering by date range, category, publisher allowlist, publisher
        blacklist, pagination, and result limit.

        Note: the documentation examples encode some multi-value filters directly
        into query strings. This spec models those filters conservatively as strings
        rather than assuming a repeated-parameter or array-based wire format.
      parameters:
        - name: company
          in: query
          required: true
          description: Company permalink or identifier to monitor.
          schema:
            type: string
          example: tesla
        - name: blacklisted
          in: query
          required: false
          description: |
            Blacklisted publisher URL or encoded value. Documentation shows URL-encoded
            string input rather than a formally typed array.
          schema:
            type: string
          example: https://www.prnewswire.com/
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return.
          schema:
            type: integer
            default: 100
            minimum: 1
          example: 100
        - name: start_date
          in: query
          required: false
          description: Start date filter in YYYY-MM-DD format.
          schema:
            type: string
            format: date
          example: 2025-01-01
        - name: end_date
          in: query
          required: false
          description: End date filter in YYYY-MM-DD format.
          schema:
            type: string
            format: date
          example: 2026-03-15
        - name: category
          in: query
          required: false
          description: |
            News category filter. Documentation examples show comma-separated values
            in a single query string.
          schema:
            type: string
          example: PARTNERSHIPS
        - name: offset
          in: query
          required: false
          description: Pagination offset.
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: publishers
          in: query
          required: false
          description: |
            Publisher URL filter. Documentation shows URL string values in the query.
          schema:
            type: string
          example: https://www.bloomberg.com/
      responses:
        '200':
          description: Company news fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyNewsResponse'
              example:
                status: success
                data:
                  - ai_summary: Tesla Inc.'s energy division was granted a license to supply electricity in the UK.
                    type: Partnerships & Alliances
                    url: https://www.bloomberg.com/news/articles/2026-03-12/tesla-s-energy-division-gets-uk-license-to-supply-electricity
                    title: Tesla’s Energy Division Gets UK License to Supply Electricity
                    scraped_text: Tesla Inc.’s energy division has been granted a license to supply electricity in the UK.
                    company_name: Tesla
                    publisher: bloomberg
                    published_date: '2026-03-12 07:55:50'
                    source: Wokelo
                    author: Priscila Azevedo Rocha
                    countries:
                      - GBR
                    sentiment: Neutral
                    company_names:
                      - name: Tesla
                        website: http://tesla-pa.com/
                    primary_tag: Partnerships & Alliances
                    original_language: EN
                    secondary_tags: []
                    newsworthiness_impact: Medium
                    primary_industry: C&I Renewable Supply & Green Tariffs
                    secondary_industry: []
                count: 1
                total: 1
                limit: 100
                offset: 0
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsErrorResponse'
              example:
                error:
                  code: bad_request
                  message: Invalid query parameters.
                  details:
                    - field: company
                      message: Company is required.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsErrorResponse'
              example:
                error:
                  code: unauthorized
                  message: Missing or invalid bearer token.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsErrorResponse'
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please retry later.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsErrorResponse'
              example:
                error:
                  code: internal_server_error
                  message: An unexpected error occurred.
  /api/enterprise/company/search:
    get:
      tags:
        - Company Search
      operationId: searchCompanies
      summary: Search companies in the Wokelo database
      description: |
        Search the Wokelo database by company name, website, or ticker symbol
        to retrieve permalinks and key attributes used by other API calls.

