components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token sent in the Authorization header.
  schemas:
    BuyerScreeningRequest:
      type: object
      additionalProperties: false
      required:
        - company
      properties:
        company:
          type: string
          description: Permalink or URL of the target company.
          example: brex
        parameters:
          $ref: '#/components/schemas/BuyerScreeningParameters'
    BuyerScreeningParameters:
      type: object
      additionalProperties: false
      properties:
        detailed_query:
          type: string
          description: A descriptive query to refine the buyer search scope and strategic criteria.
          example: Looking for companies in spend management, corporate cards, and CFO workflow software with mid-market and
            enterprise distribution
        buyer_type:
          description: |
            Type of buyer to target. The documentation shows this inconsistently
            as either a single string or an array, so both forms are allowed here.
          oneOf:
            - type: string
              enum:
                - strategic
                - financial
            - type: array
              items:
                type: string
                enum:
                  - strategic
                  - financial
          example: strategic
        company_type:
          type: string
          description: Type of company to include.
          enum:
            - private
            - public
            - all
          example: public
        geography:
          type: array
          description: Geographic scope. Docs describe ISO country codes, though an example also uses full country names.
          items:
            type: string
          example:
            - USA
    BuyerScreeningResponse:
      type: object
      additionalProperties: false
      required:
        - request_id
        - status
        - result
      properties:
        request_id:
          type: string
          description: Unique request identifier.
          example: c685171e-ce46-474b-b0de-f17123b3085a
        status:
