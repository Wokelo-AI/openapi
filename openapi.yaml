  /api/enterprise/company/enrich/:
    post:
      tags:
        - Company Deep Intelligence
        - Company Instant Enrichment
      operationId: getCompanyDeepIntelligence
      summary: Generate deep intelligence for one or more companies / Enrich one or more companies
      description: |-
        This endpoint dispatches to multiple behaviors based on the request body.

        **Mode: Company Deep Intelligence**

        Returns AI-synthesized company intelligence for one or more companies
        across the requested intelligence sections.

        This endpoint supports use cases such as:
        - product and service intelligence
        - launch and roadmap tracking
        - strategic initiative analysis
        - partnership ecosystem mapping
        - revenue model and monetization analysis
        - customer base assessment
        - management profile synthesis
        - employee and product sentiment analysis

        The request accepts one or more company identifiers, which may be
        permalinks or company URLs, and a set of supported deep intelligence sections.

        ---

        **Mode: Company Instant Enrichment**

        Returns structured company data for one or more companies across the
        requested sections.

        Typical use cases include:
        - firmographic lookup
        - product catalog enrichment
        - funding and investor history
        - acquisitions and investments
        - headcount and traffic enrichment
        - AI-computed custom fields

        The request accepts company identifiers (for example permalinks such as
        `tesla-motors`) and a list of sections to retrieve.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/DeepIntelligenceRequest'
                - $ref: '#/components/schemas/CompanyEnrichRequest'
            examples:
              Company Deep Intelligence:
                summary: Company Deep Intelligence
                value:
                  companies:
                    - zendesk
                    - freshworks
                    - intercom
                  sections:
                    - products_and_services
                    - product_launches
                    - strategic_initiatives
              Company Instant Enrichment:
                summary: Company Instant Enrichment
                value:
                  companies:
                    - tesla-motors
                  sections:
                    - firmographics
                    - products
                  parameters:
                    custom_fields:
                      - field_name: Flagship Products
                        type: text
                        prompt: List Tesla’s main products, including key vehicle models and energy offerings, in a concise
                          format.
                      - field_name: Primary Revenue Source
                        type: text
                        prompt: What is Tesla’s main source of revenue? Provide a brief 1-2 line answer.
      responses:
        '200':
          description: Dispatched operation completed successfully.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DeepIntelligenceResponse'
                  - $ref: '#/components/schemas/CompanyEnrichResponse'
              examples:
                Company Deep Intelligence:
                  summary: Company Deep Intelligence
                  value:
                    request_id: c2ad9d34-f432-4b9b-b5a2-46fbd124db5f
                    status: COMPLETED
                    result:
                      zendesk:
                        firmographics:
                          name: Zendesk
                          website: http://zendesk.com
                          location: San Francisco, United States
                          founded: 2007
                          type: private
                          operating_status: Acquired
                          ticker: NYSE:ZEN
                        CP enrichment:
                          products_and_services:
                            product_overview:
                              source:
                                - id: 1
                                  title: Sourced from Wokelo Synthesis
                                  url: ''
                                  publisher: ''
                                  date: ''
                              summary: Overview of Zendesk products and services.
                              screenshot_url: https://files.test.wokelo.ai/notebook/example/assets/example.png
                            products_and_services:
                              - product_area: Customer Service AI Solutions
                                details:
                                  - title: AI Agents
                                    summary: Autonomous AI-powered bots for customer support.
                                sources: 1-3
                          product_launches:
                            product_launches_and_initiatives:
                              released_products:
                                - date: 26-Mar-2025
                                  initiative: Resolution Platform
                                  sources:
                                    - url: https://www.prnewswire.com/example
                                      title: Zendesk launches Resolution Platform
                                      publisher: PR Newswire
