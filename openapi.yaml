  /api/workflow_manager/start/:
    post:
      tags:
        - Company Research
        - Custom Workflows
        - Industry Research
        - Peer Comparison
      operationId: startCompanyResearchWorkflow
      summary: Start company research report via workflow manager / Start a custom workflow / Start industry research report
        via workflow manager / Start peer comparison report
      description: |-
        This endpoint dispatches to multiple behaviors based on the request body.

        **Mode: Company Research**

        Starts an in-depth company intelligence report using the workflow manager.

        The documentation shows this endpoint being called with
        `workflow: company_primer` and a company `permalink`.

        ---

        **Mode: Custom Workflows**

        Starts a custom Wokelo workflow using the workflow manager.

        The request must include a `workflow` identifier. Additional request
        fields depend on the selected workflow. For example:
        - `industry_research___custom_a842447` uses `industry_research_topic`
        - `value_creation_e469641` uses `permalink`

        The response structure is workflow-specific and generally returns a
        nested research report or workbook-like JSON object.

        ---

        **Mode: Industry Research**

        Starts an end-to-end industry intelligence report using the workflow manager.

        The documentation shows this endpoint being called with
        `workflow: industry_primer` and an `industry` field.

        ---

        **Mode: Peer Comparison**

        Starts a side-by-side peer benchmarking report for up to 5 companies.

        The request uses the workflow manager with `workflow: player_comparison`
        and accepts a list of company websites plus an optional workbook name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CompanyResearchWorkflowRequest'
                - $ref: '#/components/schemas/CustomWorkflowRequest'
                - $ref: '#/components/schemas/IndustryResearchWorkflowRequest'
                - $ref: '#/components/schemas/PeerComparisonRequest'
            examples:
              Company Research:
                summary: Company Research
                value:
                  workflow: company_primer
                  permalink: salesforce
              Custom Workflows:
                summary: Custom Workflows
                value:
                  workflow: industry_research___custom_a842447
                  industry_research_topic: Electric vehicles
              Industry Research:
                summary: Industry Research
                value:
                  workflow: industry_primer
                  industry: Electronics Manufacturing Services
              Peer Comparison:
                summary: Peer Comparison
                value:
                  workflow: player_comparison
                  websites:
                    - https://we.are.expensify.com/
                    - https://ramp.com/
                    - https://www.airbase.com/
                    - http://www.expensya.com/
                    - https://payhawk.com/
                  workbook_name: Peer Comparison
      responses:
        '200':
          description: Dispatched operation completed successfully.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CompanyResearchResponse'
                  - $ref: '#/components/schemas/CustomWorkflowResponse'
                  - $ref: '#/components/schemas/IndustryResearchResponse'
                  - $ref: '#/components/schemas/PeerComparisonResponse'
              examples:
                Company Research:
                  summary: Company Research
                  value:
                    Quick Snapshot:
                      Quick Snapshot:
                        quick_snapshot:
                          company_firmographics:
                            organization:
                              name: Salesforce
                              logo: https://wklogo.blob.core.windows.net/logos-thumbnail/salesforce.png
