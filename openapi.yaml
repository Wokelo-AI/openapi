openapi: 3.0.3
info:
  title: Wokelo API
  version: 1.0.0
  description: |-
    Wokelo's API suite is purpose-built for developers building dealmaking AI infrastructure. It delivers structured, processed intelligence at the quality standard investment and advisory workflows demand.

    - Entities resolved across a proprietary database of 20M+ public and private companies.
    - News signals deduplicated across 1,000+ curated sources.
    - Every output is agent-native, source-traced, and ready to plug directly into your models, agents, and workflows without additional processing.
  contact:
    name: Wokelo
    url: https://wokelo.ai
    email: support@wokelo.ai
  license:
    name: Proprietary
    url: https://wokelo.ai/terms
servers:
  - url: https://api.wokelo.ai
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Company Instant Enrichment
    description: Instant fundamentals and alternative data on cached companies (20M+).
  - name: Company Deep Intelligence
    description: On-demand deep intelligence with custom parameters on any company.
  - name: Industry Deep Intelligence
    description: On-demand intelligence with custom parameters on any industry.
  - name: Market Map
    description: Ranked company discovery within a market category.
  - name: Target Screening
    description: Scored acquisition targets for a defined acquirer.
  - name: Buyer Screening
    description: Scored buyers for a defined target company.
  - name: Company News Monitoring
    description: News retrieval, enrichment, and filtering for a specific company.
  - name: Company Research
    description: End-to-end company research report.
  - name: Industry Research
    description: End-to-end sector coverage report.
  - name: Peer Comparison
    description: Multi-company comparative analysis across chosen dimensions.
  - name: Custom Workflows
    description: Trigger custom research workflows built in Wokelo.
  - name: Company Search
    description: Search and resolve company identifiers.
  - name: File Upload
    description: Upload assets used by other workflows.
  - name: Request Lifecycle
    description: Check status, cancel, or fetch results of async requests.
  - name: Report Lifecycle
    description: Check status of and download generated reports.
  - name: Report Configuration
    description: Configure and retrieve report metadata.
paths:
  /api/assets/download_report/:
    post:
      tags:
        - Report Lifecycle
      operationId: downloadReport
      summary: Download a completed report
      description: |
        Download a completed report in one of the supported export formats:
        `pdf`, `docx`, `ppt`, or `json`.

        The documentation notes that `ppt` is only supported for company research
        and industry research reports.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadReportRequest'
            example:
              report_id: 109196
              file_type: json
      responses:
        '200':
          description: Report download payload returned successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                report_id: 109196
                file_type: json
                url: https://api.wokelo.ai/downloads/report-109196.json
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
  /api/assets/get_notebook_status/:
    get:
      tags:
        - Report Lifecycle
      operationId: getReportStatus
      summary: Check report status
      description: |
        Get the status of a report created using workflow APIs such as
        Company Research, Industry Research, Peer Comparison, or Custom workflows.
      parameters:
        - name: report_id
          in: query
          required: true
          description: Report identifier.
          schema:
            oneOf:
              - type: integer
              - type: string
          example: 109196
      responses:
        '200':
          description: Report status returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportStatusResponse'
              example:
                report_id: 109196
                status: COMPLETED
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
  /api/assets/upload/:
    post:
      tags:
        - File Upload
      operationId: uploadAssets
      summary: Upload files for research workflows
      description: |
        Upload proprietary files to Wokelo to supplement research reports
        with internal data.

        Each uploaded file receives a unique identifier that can be referenced
        in custom workflow inputs. The documentation examples send multipart
        form data with repeated `files` parts plus a `fileUUID` JSON-string field.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileUploadRequest'
            encoding:
              files:
                style: form
                explode: true
              fileUUID:
                style: form
            example:
              fileUUID: '["k3m8n5p1q6", "a7f4b9e2c3"]'
      responses:
        '200':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: success
                data:
                  - fileName: k3m8n5p1q6
                    originalName: lemonade_diligence.pdf
                  - fileName: a7f4b9e2c3
                    originalName: lemonade.pdf
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportErrorResponse'
  /api/company_primer/v3/start/:
    post:
      tags:
        - Company Research
      operationId: startCompanyResearchDirect
      summary: Start company research report directly
      description: |
        Starts an in-depth company intelligence report using the direct company primer endpoint.

        Either `website` or `permalink` is required according to the documentation.
        `industry` is optional and may be auto-detected if omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyResearchDirectRequest'
            example:
              industry: Artificial Intelligence
              website: https://wokelo.ai
      responses:
        '200':
          description: Company research report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResearchResponse'
              example:
                Quick Snapshot:
                  Quick Snapshot:
                    quick_snapshot:
                      company_firmographics:
                        organization:
                          name: Salesforce
                          logo: https://wklogo.blob.core.windows.net/logos-thumbnail/salesforce.png
                          url: https://app.wokelo.ai/dashboard/workflows/company-deep-dive-new-v2/?company=salesforce
                        details:
                          industry: Artificial Intelligence (AI), Cloud Computing, CRM, SaaS
                          founded_year: '1999'
                          website: https://www.salesforce.com
                          hq: San Francisco, United States
                          operating_status: active
                          company_type: public
                          employees_in_crunchbase: 10000+
                          employees_in_linkedin: 87189
                          ticker: NYSE:CRM
                      product_details:
                        product_category: Cloud CRM Software
                        summary: Salesforce provides a cloud-based platform for customer relationship management.
                    sources:
                      - id: 1
                        title: Crunchbase
                        url: ''
                        publisher: ''
                        date: ''
                Executive Summary:
                  Executive Summary:
                    summary: Overview, strategic positioning, recent developments, and key capabilities.
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResearchErrorResponse'
              example:
                error:
                  code: bad_request
                  message: Invalid request payload.
                  details:
                    - field: website
                      message: Either website or permalink is required.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResearchErrorResponse'
              example:
                error:
                  code: unauthorized
                  message: Missing or invalid bearer token.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResearchErrorResponse'
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please retry later.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResearchErrorResponse'
              example:
                error:
                  code: internal_server_error
                  message: An unexpected error occurred.
  /api/enterprise/buyer-screening/enrich/:
    post:
      tags:
        - Buyer Screening
      operationId: screenBuyers
      summary: Generate scored buyers for a target company
      description: |
        Returns a ranked list of potential buyers for a specified target company.

        Use `company` to identify the target company, and `parameters` to refine
        the buyer search using a descriptive query, buyer type, company type,
        and geographic scope.

        The response includes firmographic and financial information for candidate buyers,
        along with ranking metrics such as overall score, deal feasibility,
        product synergy, deal precedent, and synergy potential where available.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuyerScreeningRequest'
            example:
              company: acme-security
              parameters:
                detailed_query: Looking for strategic acquirers in enterprise software
                buyer_type:
                  - strategic
                company_type: public
                geography:
                  - USA
      responses:
        '200':
          description: Buyer screening completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerScreeningResponse'
              example:
                request_id: c685171e-ce46-474b-b0de-f17123b3085a
                status: COMPLETED
